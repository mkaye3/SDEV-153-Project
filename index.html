<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Safer Roads Initiative</title>
    <link rel="icon" href="favicon.png" type="image/png">
  </head>
  <div id="header-placeholder"></div>


  <body>
    <section class="white-content-block">
      <img src="Driving-POV.jpg" alt="Car driving with driver POV" class="section-image">
      <div class=text-content">
      <h1 class="main-page-h1">
        What We Stand For
      </h1>
      <p class="main-page-p>
        Our mission is to improve road safety and reduce traffic-related accidents through stronger enforcement of traffic laws, 
        including increased fines and appropriate incarceration for serious and repeat offenders. 
        We believe that accountability on the road is essential to protecting lives and creating safer communities. 
        By discouraging reckless and dangerous driving behaviors, we aim to promote responsibility, awareness, and respect among all drivers. 
        Ultimately, our goal is to reduce preventable crashes and ensure that every person on the road can travel safely and confidently.
      </p>
      </div>
    </section>
      















  </body>

<script>
  fetch('header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading header:', error));
</script>
</html>
